name: Build and publish a Docker image to ghcr.io and dockerhub

on:
  release:
    types: [published]
  push:
    branches: [ "main", "test" ]
  pull_request:
    branches: [ "main", "test" ]

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: akira25/gnuradio-docker-container
  GR_VERSION: "3.10"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build Platform Image
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Github code
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}

      - name: Build and Push Platform Image
        id: build-platform
        uses: docker/build-push-action@v6
        with:
          context: ./alpine/3.10/
          file: ./alpine/3.10/Dockerfile
          no-cache: true
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          #tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.GR_VERSION }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          tags: |
            akira25/gnuradio-docker-container:3.10-alpine
            akira25/gnuradio-docker-container:latest
          #  ghcr.io/akira25/gnuradio-docker-container:3.10-alpine
          #  ghcr.io/akira25/gnuradio-docker-container:latest
          labels: ${{ steps.meta.outputs.labels }}

  merge-and-push:
    name: Merge and Release Multi-arch Image
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create Multi-arch Manifests
        run: |
          for tag in ${{ env.GR_VERSION }}-alpine latest; do
            docker buildx imagetools create -t ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${tag} \
              ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.GR_VERSION }}-amd64 \
              ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.GR_VERSION }}-arm64
          done

      #- name: Cleanup Platform Tags
      #  run: |
      #    set -e
      #    TOKEN=$(curl -s -X POST -H "Content-Type: application/json" \
      #      -d '{"username": "'${{ secrets.DOCKERHUB_USERNAME }}'", "password": "'${{ secrets.DOCKERHUB_PASSWORD }}'"}' \
      #      https://hub.docker.com/v2/users/login/ | jq -r .token)
